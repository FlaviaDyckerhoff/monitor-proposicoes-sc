name: Monitor Proposições SC

env:
  TZ: America/Sao_Paulo

on:
  workflow_dispatch:

jobs:
  monitorar:
    runs-on: self-hosted
    permissions:
      contents: write

    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Garantir permissões do checkout
        run: |
          sudo chown -R "$(id -u):$(id -g)" "$GITHUB_WORKSPACE" || true

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Instalar dependências
        run: npm install

      - name: Executar monitor
        env:
          EMAIL_REMETENTE: ${{ secrets.EMAIL_REMETENTE }}
          EMAIL_SENHA: ${{ secrets.EMAIL_SENHA }}
          EMAIL_DESTINO: ${{ secrets.EMAIL_DESTINO }}
        run: |
          set +e
          node monitor.js 2>&1 | tee monitor.log
          status=${PIPESTATUS[0]}
          if [ "$status" -ne 0 ]; then
            {
              echo "## Monitor SC falhou na execução"
              echo
              echo '```text'
              tail -80 monitor.log
              echo '```'
            } >> "$GITHUB_STEP_SUMMARY"
            echo "::error title=Monitor SC execução::$(tail -20 monitor.log | tr '\n' ' ' | sed 's/%/%25/g')"
          fi
          exit "$status"

      - name: Salvar estado atualizado no repositório
        run: |
          set +e
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if [ ! -f estado.json ]; then
            echo '{"proposicoes_vistas":[],"ultima_execucao":""}' > estado.json
          fi
          git add estado.json
          git diff --staged --quiet || git commit -m "chore: atualiza estado [skip ci]"
          status_commit=$?
          if [ "$status_commit" -ne 0 ]; then
            echo "FALHA_ESTADO=git commit/push estado.json falhou antes do push" | tee estado-error.log
            echo "::error title=Monitor SC estado::Falha ao commitar estado.json"
            exit "$status_commit"
          fi
          git push 2>&1 | tee estado-push.log
          status_push=${PIPESTATUS[0]}
          if [ "$status_push" -ne 0 ]; then
            echo "FALHA_ESTADO=git push estado.json falhou" | tee estado-error.log
            echo "::error title=Monitor SC estado::Falha ao enviar estado.json para o GitHub"
          fi
          exit "$status_push"

      - name: Alertar falha interna
        if: failure()
        env:
          EMAIL_REMETENTE: ${{ secrets.EMAIL_REMETENTE }}
          EMAIL_SENHA: ${{ secrets.EMAIL_SENHA }}
          EMAIL_ALERTA_FALHA: flavia@monitorlegislativo.com.br
        run: node scripts/send-failure-alert.js
